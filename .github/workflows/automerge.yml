name: Auto-merge

# Squash-merges trusted PRs as soon as CI passes -- without requiring the
# repository to have branch protection rules on `main`.
#
# Why not `gh pr merge --auto`?
#   GitHub's native auto-merge (`--auto` / enablePullRequestAutoMerge) is
#   only accepted when the target branch has a branch-protection rule:
#     "Pull request Protected branch rules not configured for this branch
#      (enablePullRequestAutoMerge)"
#   That makes a repo un-forkable out of the box. So instead we listen for
#   the CI workflow's completion and, if it succeeded on an open PR whose
#   author we trust, call `gh pr merge --squash` directly.
#
# Trusted PR sources:
#   1. Author is the repository owner (resolved via github.repository_owner).
#   2. Author is `github-actions[bot]`.
#   3. PR carries the `automerge` label.
#
# Security note:
#   `workflow_run` always runs the workflow from the repository's default
#   branch, not from the PR branch. A malicious PR cannot modify this file
#   and then have the modified version run.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    name: Squash-merge trusted PR on green CI
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve PR and merge if trusted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          # Locate the open PR associated with this CI run's HEAD commit.
          # For same-repo PRs the `pull_requests` array in the workflow_run
          # payload is usually populated; for fork PRs it is empty, so we
          # fall back to the commits-to-pulls REST endpoint which works in
          # both cases.
          pr_json=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.state == "open" and .base.ref == "main")]')
          pr_count=$(printf '%s' "$pr_json" | jq 'length')
          if [ "$pr_count" = "0" ]; then
            echo "No open PR targets main for HEAD ${HEAD_SHA}; nothing to do."
            exit 0
          fi

          pr_number=$(printf '%s' "$pr_json" | jq -r '.[0].number')
          author=$(printf '%s' "$pr_json" | jq -r '.[0].user.login')
          is_draft=$(printf '%s' "$pr_json" | jq -r '.[0].draft')
          labels=$(printf '%s' "$pr_json" | jq -r '[.[0].labels[].name] | join(",")')

          echo "PR #${pr_number} by ${author}, draft=${is_draft}, labels=[${labels}]"

          if [ "$is_draft" = "true" ]; then
            echo "PR is draft; skipping."
            exit 0
          fi

          trusted="false"
          if [ "$author" = "$OWNER" ] || [ "$author" = "github-actions[bot]" ]; then
            trusted="true"
          fi
          case ",$labels," in
            *,automerge,*) trusted="true" ;;
          esac

          if [ "$trusted" != "true" ]; then
            echo "Author '${author}' is not trusted and 'automerge' label absent; skipping."
            exit 0
          fi

          echo "CI passed and PR is trusted -- squash-merging PR #${pr_number}..."
          gh pr merge --squash --delete-branch --repo "$REPO" "$pr_number"
